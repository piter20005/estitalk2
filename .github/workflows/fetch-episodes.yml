name: Sync RSS to Sanity

on:
  schedule:
    - cron: '*/15 * * * *'   # co 15 minut
  workflow_dispatch:          # ręczny start

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev --no-audit --no-fund --include=prod

      - name: Fetch RSS feed
        run: |
          RSS_URL="https://anchor.fm/s/f8d844f8/podcast/rss"

          curl -f -sL \
            --retry 3 --retry-delay 5 \
            --user-agent "Podcasts/1450.1.1 CFNetwork/1390 Darwin/22.0.0" \
            --header "Accept: application/rss+xml, application/xml, text/xml, */*" \
            --max-time 30 \
            "$RSS_URL" \
            -o /tmp/feed.xml

          echo "Downloaded $(wc -c < /tmp/feed.xml) bytes"
          head -c 5 /tmp/feed.xml | grep -q '<' || { echo "::error::Response is not XML"; exit 1; }

      - name: Sync to Sanity
        env:
          SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
        run: node scripts/sync-rss-to-sanity.js /tmp/feed.xml

      - name: Trigger Netlify build
        if: success() && env.NETLIFY_BUILD_HOOK != ''
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: curl -fsS -X POST "$NETLIFY_BUILD_HOOK" || echo "::warning::Netlify hook failed"
