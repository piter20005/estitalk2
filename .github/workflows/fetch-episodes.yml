name: Fetch Episodes

on:
  schedule:
    - cron: '0 */2 * * *'   # co 2 godziny
  workflow_dispatch:          # ręczne uruchomienie z zakładki Actions

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch episodes from RSS
        run: node scripts/fetch-episodes.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/episodes.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update episodes.json [skip ci]" && git push)
